[defaults]
MODULE_STRICT_UTF8_RESPONSE=false
vault_password_file = .vault
interpreter_python = auto_legacy_silent
callbacks_enabled = profile_roles,timer
#profile_tasks,
roles_path = roles:/usr/share/ansible/roles:/etc/ansible/roles
# Отключить проверку минимальной версии Python
ansible_python_interpreter = /usr/bin/python3
[all]
pipelining = True
ansible_ssh_pipelining=True
strategy = free
forks = 10
stdout_callback = yaml
[ssh_connection]
timeout = 60
ssh_args = -o ControlMaster=auto -o ControlPersist=3600s -o ServerAliveInterval=30 -o ServerAliveCountMax=10
retries=3
