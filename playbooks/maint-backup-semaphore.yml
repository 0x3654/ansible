---
- name: Backup Semaphore database to MBA
  hosts: semaphore_role
  gather_facts: true
  connection: local

  vars:
    semaphore_db_path: /var/lib/semaphore/database.sqlite
    semaphore_db_tmp: /tmp/semaphore_backup.sqlite
    backup_dir: "{{ hostvars['mba']['semaphore_backup_local_dir'] }}/{{ ansible_host }}"

  tasks:
    - name: Create consistent SQLite backup
      ansible.builtin.shell: >
        python3 -c "import sqlite3;
        src=sqlite3.connect('{{ semaphore_db_path }}');
        dst=sqlite3.connect('{{ semaphore_db_tmp }}');
        src.backup(dst); dst.close(); src.close()"
      changed_when: true

    - name: Ensure backup directory exists on MBA
      ansible.builtin.file:
        path: "{{ backup_dir }}"
        state: directory
        mode: "0755"
      delegate_to: mba

    - name: Copy backup to MBA
      ansible.builtin.copy:
        src: "{{ semaphore_db_tmp }}"
        dest: "{{ backup_dir }}/database_{{ ansible_date_time.date }}.sqlite"
        mode: "0644"
      delegate_to: mba

    - name: Remove temporary backup
      ansible.builtin.file:
        path: "{{ semaphore_db_tmp }}"
        state: absent
