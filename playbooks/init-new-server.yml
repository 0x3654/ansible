---
- name: Bootstrap system and configure SSH root access
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: false
  become: true
  become_method: ansible.builtin.sudo

  vars:
    ubuntu_user: ubuntu
    ansible_user: root
    ansible_python_interpreter: /bin/sh
    forse_update_htop: "true"
    required_packages:
      - docker-ce
      - docker-compose-plugin
    install_docker_repo: true
    # Отключаем проверку версии Python для Ubuntu 20.04
    ansible_python_version_required: false

  pre_tasks:
    - name: Check Python version
      ansible.builtin.raw: python3 --version
      register: python_version
      changed_when: false
      failed_when: false

    - name: Display detected Python version
      ansible.builtin.debug:
        msg: "Detected Python version: {{ python_version.stdout | default('not found') }}"

    - name: Install python3 if not present
      ansible.builtin.raw: |
        if ! command -v python3 >/dev/null 2>&1; then
          apt-get update && apt-get install -y python3
        fi
      changed_when: false

    - name: Check if Python 3.11 is already installed
      ansible.builtin.raw: test -x /usr/local/bin/python3.11 && test -f /usr/local/lib/python3.11/site-packages/apt/__init__.py
      register: python311_installed
      changed_when: false
      failed_when: false

    - name: Ensure Python 3.11 and python-apt are installed (Ubuntu 20.04 arm64)
      ansible.builtin.raw: |
        set -e
        apt-get update
        apt-get install -y build-essential wget libssl-dev zlib1g-dev libbz2-dev libreadline-dev \
          libsqlite3-dev libapt-pkg-dev git liblzma-dev libncurses5-dev libgdbm-dev libnss3-dev libffi-dev
        cd /tmp
        wget -q https://www.python.org/ftp/python/3.11.9/Python-3.11.9.tgz
        tar -xzf Python-3.11.9.tgz
        cd Python-3.11.9
        ./configure --with-ensurepip=install --with-openssl=rpath
        make -j"$(nproc)"
        make altinstall
        cd /
        rm -rf /tmp/Python-3.11.9*
        /usr/local/bin/python3.11 -m ensurepip --upgrade
        /usr/local/bin/python3.11 -m pip install --upgrade pip
        # Скачаем и соберём python-apt вручную
        cd /tmp
        rm -rf python-apt python-apt-*
        wget -q https://launchpad.net/ubuntu/+archive/primary/+sourcefiles/python-apt/2.0.0ubuntu0.20.04.2/python-apt_2.0.0ubuntu0.20.04.2.tar.xz
        tar -tf python-apt_2.0.0ubuntu0.20.04.2.tar.xz | head -1 | cut -d/ -f1 > /tmp/tar_dir.txt
        TAR_DIR=$(cat /tmp/tar_dir.txt)
        tar -xf python-apt_2.0.0ubuntu0.20.04.2.tar.xz
        cd "$TAR_DIR"
        /usr/local/bin/python3.11 setup.py build
        /usr/local/bin/python3.11 setup.py install
      changed_when: false
      when: python311_installed.rc != 0

    - name: Ensure /usr/bin/python3 symlink points to Python 3.11
      ansible.builtin.raw: |
        if [ -x /usr/local/bin/python3.11 ]; then
          ln -sf /usr/local/bin/python3.11 /usr/bin/python3
        fi
      changed_when: false

    - name: Ensure lsb-release is installed for fact gathering
      ansible.builtin.raw: |
        if ! command -v lsb_release >/dev/null 2>&1; then
          apt-get update && apt-get install -y lsb-release
        fi
      changed_when: false

    - name: Set python interpreter for subsequent tasks to Python 3.11
      ansible.builtin.set_fact:
        ansible_python_interpreter: /usr/local/bin/python3.11

    - name: Set ansible_user for Ubuntu servers
      when: "'ubuntu_servers' in group_names"
      ansible.builtin.set_fact:
        ansible_user: "{{ ubuntu_user }}"

    - name: Gather facts with new interpreter
      ansible.builtin.setup:

    - name: Check if SSH config needs changes
      ansible.builtin.raw: |
        grep -q 'PermitRootLogin yes' /etc/ssh/sshd_config 2>/dev/null || echo "needs_change"
        grep -q 'PasswordAuthentication no' /etc/ssh/sshd_config 2>/dev/null || echo "needs_change"
      register: ssh_config_status
      changed_when: false
      failed_when: false

    - name: Configure SSH only if needed
      when: "'needs_change' in ssh_config_status.stdout"
      block:
        - name: Ensure root SSH login is enabled
          ansible.builtin.lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^PermitRootLogin'
            line: 'PermitRootLogin yes'
            state: present

        - name: Install public keys for root
          ansible.posix.authorized_key:
            user: root
            state: present
            key: "{{ lookup('file', '~/.ssh/id_rsa.pub') }}"

        - name: Disable password authentication for SSH
          ansible.builtin.lineinfile:
            path: /etc/ssh/sshd_config
            regexp: '^PasswordAuthentication'
            line: 'PasswordAuthentication no'
            state: present

        - name: Restart sshd service
          ansible.builtin.service:
            name: ssh
            state: restarted

  handlers:
    - name: Restart sshd service
      ansible.builtin.service:
        name: ssh
        state: restarted

  tasks:
    - name: Change sudoers file to NOPASSWD for sudo group (Debian 11+)
      become: true
      when: >
        (ansible_facts['os_family'] | default('')) == "Debian"
        and (ansible_facts['distribution_major_version'] | default('0')) | int >= 11
        and (ansible_facts['distribution'] | default('')) == 'Debian'
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        state: present
        regexp: '^%sudo'
        line: '%sudo ALL=(ALL) NOPASSWD: ALL'
        validate: /usr/sbin/visudo -cf %s

    - name: Install htop if not present
      ansible.builtin.raw: |
        if ! command -v htop >/dev/null 2>&1; then
          apt-get update && apt-get install -y htop
        fi
      changed_when: false

    - name: APT update, upgrade, and install packages
      when: ansible_pkg_mgr == 'apt'
      block:
        - name: APT Dist upgrade
          ansible.builtin.apt:
            upgrade: dist

        - name: APT Install required packages
          ansible.builtin.apt:
            name: "{{ required_packages }}"
            state: present
            force: true

    # TODO FIX THIS TASK. add permission for media folders
    - name: Ensure host media folders exist
      when: homelab_role_media_binds is defined
      ansible.builtin.file:
        path: "{{ media_file.split(':')[0] }}"
        state: directory
        owner: "{{ folder_user | d(ansible_user | d('root')) }}"
        group: "{{ folder_user | d(ansible_user | d('root')) }}"
        mode: '{{ directory_mode }}'
      loop: "{{ homelab_role_media_binds }}"
      loop_control:
        loop_var: media_file

    - name: Set permissions on host media folders
      when: homelab_role_media_binds is defined
      ansible.builtin.file:
        path: "{{ media_file.split(':')[0] }}"
        owner: "{{ folder_user | d(ansible_user | d('root')) }}"
        group: "{{ folder_user | d(ansible_user | d('root')) }}"
        mode: "{{ file.mode | d(file_mode) }}"
        recurse: true
      loop: "{{ homelab_role_media_binds }}"
      loop_control:
        loop_var: media_file
