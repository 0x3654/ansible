---
# GISP Downloader - Download CSV files from minpromtorg.gov.ru
# On success, triggers the next task in the pipeline via Semaphore API.
# Requires semaphore_api_token in Semaphore Variable Group.
# semaphore_next_template_name defaults to gisp-2-import, override in extra vars if needed.
- name: GISP Downloader
  hosts: gisp_role
  gather_facts: false
  vars:
    semaphore_next_template_name: "gisp-2-import"
    semaphore_url: "http://localhost:3000"
    semaphore_project_id: 1
  tasks:
    - name: Run downloader container
      ansible.builtin.command:
        cmd: docker compose run --rm --pull always downloader
        chdir: "{{ gisp_project_src }}"
      environment:
        PATH: "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
      register: downloader_result
      failed_when: false
      changed_when: false

    - name: Show downloader output
      ansible.builtin.debug:
        msg: "{{ downloader_result.stdout }}"

    - name: Send Telegram notification on failure
      ansible.builtin.shell: |
        set -a
        . "{{ gisp_project_src }}/.env"
        set +a
        . "{{ gisp_project_src }}/scripts/send_telegram.sh"
        printf '%s' "{{ downloader_result.stdout }}" > /tmp/gisp_downloader_output.txt
        send_heartbeat "❌ <b>GISP Downloader</b> завершился с ошибкой (код {{ downloader_result.rc }})" "/tmp/gisp_downloader_output.txt"
        rm -f /tmp/gisp_downloader_output.txt
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      when: downloader_result.rc != 0

    - name: Fail if downloader container failed
      ansible.builtin.fail:
        msg: "Downloader container exited with code {{ downloader_result.rc }}"
      when: downloader_result.rc != 0

    # Chain: trigger next task by name. Requires semaphore_api_token and
    # semaphore_next_template_name in Semaphore template extra vars.
    # prod: semaphore_next_template_name: gisp-2-import
    # dev:  semaphore_next_template_name: dev_2_gisp-import
    - name: Get Semaphore templates
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ semaphore_project_id }}/templates"
        method: GET
        headers:
          Authorization: "Bearer {{ semaphore_api_token }}"
      delegate_to: localhost
      register: semaphore_templates
      when: semaphore_api_token is defined and semaphore_next_template_name is defined

    - name: Trigger next task via Semaphore API
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ semaphore_project_id }}/tasks"
        method: POST
        headers:
          Authorization: "Bearer {{ semaphore_api_token }}"
          Content-Type: "application/json"
        body: "{{ {'template_id': (semaphore_templates.json | selectattr('name', 'equalto', semaphore_next_template_name) | list | first).id | int} | to_json }}"
        status_code: 201
      delegate_to: localhost
      when: semaphore_api_token is defined and semaphore_next_template_name is defined
