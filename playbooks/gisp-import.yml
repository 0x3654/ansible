---
# GISP Import - Import CSV files to PostgreSQL
# On success, triggers the next task in the pipeline via Semaphore API.
# Requires semaphore_api_token in Semaphore Variable Group.
# semaphore_next_template_name defaults to gisp-3-embeddings, override in extra vars if needed.
- name: GISP Import
  hosts: gisp_role
  gather_facts: false
  vars:
    semaphore_next_template_name: "{{ 'dev_3_gisp-embeddings' if inventory_hostname == 'mba' else 'gisp-3-embeddings' }}"
    semaphore_url: "http://localhost:3000"
    semaphore_project_id: 1
  tasks:
    - name: Run import container
      ansible.builtin.command:
        cmd: docker compose run --rm --pull always import
        chdir: "{{ gisp_project_src }}"
      environment:
        PATH: "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
      register: import_result
      failed_when: false
      changed_when: import_result.rc == 0

    - name: Show import output
      ansible.builtin.debug:
        msg: "{{ import_result.stdout }}"

    - name: Write import output to temp file
      ansible.builtin.copy:
        content: "{{ import_result.stdout }}"
        dest: /tmp/gisp_import_output.txt
        mode: '0644'

    - name: Send Telegram notification
      ansible.builtin.shell: |
        set -a
        . "{{ gisp_project_src }}/.env"
        set +a
        . "{{ gisp_project_src }}/scripts/send_telegram.sh"
        if [ "{{ import_result.rc }}" -eq 0 ]; then
          send_heartbeat "✅ <b>GISP Import</b> завершён успешно" "/tmp/gisp_import_output.txt"
        else
          send_heartbeat "❌ <b>GISP Import</b> завершился с ошибкой (код {{ import_result.rc }})" "/tmp/gisp_import_output.txt"
        fi
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false

    - name: Remove temp file
      ansible.builtin.file:
        path: /tmp/gisp_import_output.txt
        state: absent

    - name: Fail if import container failed
      ansible.builtin.fail:
        msg: "Import container exited with code {{ import_result.rc }}"
      when: import_result.rc != 0

    # Chain: trigger next task by name. Requires semaphore_api_token and
    # semaphore_next_template_name in Semaphore template extra vars.
    # prod: semaphore_next_template_name: gisp-3-embeddings
    # dev:  semaphore_next_template_name: dev_3_gisp-embeddings
    - name: Get Semaphore templates
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ semaphore_project_id }}/templates"
        method: GET
        headers:
          Authorization: "Bearer {{ semaphore_api_token }}"
      delegate_to: localhost
      register: semaphore_templates
      retries: 3
      delay: 30
      until: semaphore_templates is succeeded
      when: semaphore_api_token is defined and semaphore_next_template_name is defined

    - name: Trigger next task via Semaphore API
      ansible.builtin.uri:
        url: "{{ semaphore_url }}/api/project/{{ semaphore_project_id }}/tasks"
        method: POST
        headers:
          Authorization: "Bearer {{ semaphore_api_token }}"
          Content-Type: "application/json"
        body: >-
          {{ {'template_id': (semaphore_templates.json
          | selectattr('name', 'equalto', semaphore_next_template_name)
          | list | first).id | int} | to_json }}
        status_code: 201
      delegate_to: localhost
      register: semaphore_trigger
      retries: 3
      delay: 30
      until: semaphore_trigger is succeeded
      when: semaphore_api_token is defined and semaphore_next_template_name is defined
