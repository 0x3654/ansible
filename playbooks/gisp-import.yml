---
# GISP Import - Import CSV files to PostgreSQL
- name: GISP Import
  hosts: gisp_role
  gather_facts: false
  tasks:
    - name: Run import container
      ansible.builtin.command:
        cmd: docker compose run --rm import
        chdir: "{{ gisp_project_src }}"
      environment:
        PATH: "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
      register: import_result

    - name: Show import results
      ansible.builtin.debug:
        var: import_result
