---
# DevOps Stack Configuration

# Paths (in ~/code/devops)
devops_dir: "{{ ansible_env.HOME }}/code/devops"  # noqa: var-naming[no-role-prefix]

# Service ports
devops_ports:  # noqa: var-naming[no-role-prefix]
  redis: 6379
  postgres: 5433
  gitea_http: 3000
  gitea_ssh: 2222
  prometheus: 9090
  grafana: 3001

# Database credentials (use vars/secrets.yml for sensitive data)
devops_db_user: devops  # noqa: var-naming[no-role-prefix]
devops_db_name: devops  # noqa: var-naming[no-role-prefix]

# K3s cluster configuration
k3d_cluster_name: devops  # noqa: var-naming[no-role-prefix]
k3d_cluster_agents: 2  # noqa: var-naming[no-role-prefix]
k3d_api_port: 6550  # noqa: var-naming[no-role-prefix]
k3d_lb_port: 8080  # noqa: var-naming[no-role-prefix]

# Grafana credentials (use vars/secrets.yml for sensitive data)
grafana_admin_user: admin  # noqa: var-naming[no-role-prefix]

# Gitea configuration
gitea_user_uid: 1000  # noqa: var-naming[no-role-prefix]
gitea_user_gid: 1000  # noqa: var-naming[no-role-prefix]
