---
# defaults file for gisp

# Required system packages
required_packages:  # noqa: var-naming[no-role-prefix]
  - docker-ce
  - docker-compose-plugin

# Docker repository installation control
install_docker_repo: true  # noqa: var-naming[no-role-prefix]
update_repo: true  # noqa: var-naming[no-role-prefix]
force_repo_update: true  # noqa: var-naming[no-role-prefix]

# User and paths (universal DRY variables)
folder_user: "{{ ansible_role_name | basename }}"  # noqa: var-naming[no-role-prefix]
pwd: "/git"  # noqa: var-naming[no-role-prefix]
path: "{{ pwd }}/{{ ansible_role_name | basename }}"  # noqa: var-naming[no-role-prefix]

# File permissions
directory_mode: "0755"  # noqa: var-naming[no-role-prefix]
file_mode: "0644"  # noqa: var-naming[no-role-prefix]

# Service ports
api_port: 8000  # noqa: var-naming[no-role-prefix]
openwebui_port: 3333  # noqa: var-naming[no-role-prefix]
semantic_port: 8010  # noqa: var-naming[no-role-prefix]
postgres_port: 5432  # noqa: var-naming[no-role-prefix]

# PostgreSQL settings
pg_data: "/var/lib/postgresql/data/pgdata"  # noqa: var-naming[no-role-prefix]
pg_shm_size: "2g"  # noqa: var-naming[no-role-prefix]
pg_autoprewarm_interval: 120  # noqa: var-naming[no-role-prefix]

# API service
reestr_min_limit: 1  # noqa: var-naming[no-role-prefix]
reestr_default_limit: 20  # noqa: var-naming[no-role-prefix]
reestr_max_limit: 200  # noqa: var-naming[no-role-prefix]
reestr_min_offset: 0  # noqa: var-naming[no-role-prefix]
reestr_default_offset: 0  # noqa: var-naming[no-role-prefix]

# Semantic service
semantic_workers: 2  # noqa: var-naming[no-role-prefix]
semantic_cache_ttl_seconds: 604800  # noqa: var-naming[no-role-prefix]
semantic_force_seqscan: 0  # noqa: var-naming[no-role-prefix]

# Import settings
files_dir: "/files"  # noqa: var-naming[no-role-prefix]
start_date: "2024-09-05"  # noqa: var-naming[no-role-prefix]
base_url: "https://minpromtorg.gov.ru/opendata/1000000012-ReestrProducts/data-{date}-structure-20210405.csv"  # noqa: var-naming[no-role-prefix]
log_dir: "/var/log/registry"  # noqa: var-naming[no-role-prefix]
max_csv_files: 7  # noqa: var-naming[no-role-prefix]
max_log_files: 7  # noqa: var-naming[no-role-prefix]
auto_embed: 1  # noqa: var-naming[no-role-prefix]
starter_force: 0  # noqa: var-naming[no-role-prefix]
starter_max_wait: 180  # noqa: var-naming[no-role-prefix]

# Downloader
download_method: "direct"  # noqa: var-naming[no-role-prefix]

# Timezone
timezone: "Europe/Moscow"  # noqa: var-naming[no-role-prefix]


# Embeddings worker
embeddings_batch_size: 200  # noqa: var-naming[no-role-prefix]
embeddings_shard_index: 0  # noqa: var-naming[no-role-prefix]
embeddings_shard_count: 1  # noqa: var-naming[no-role-prefix]

# Worker flags
force: 0  # noqa: var-naming[no-role-prefix]
dry_run: 0  # noqa: var-naming[no-role-prefix]
source_files: ""  # noqa: var-naming[no-role-prefix]
embed_ids: ""  # noqa: var-naming[no-role-prefix]
limit: ""  # noqa: var-naming[no-role-prefix]
extra_embed_args: ""  # noqa: var-naming[no-role-prefix]
semantic_url_override: ""  # noqa: var-naming[no-role-prefix]
