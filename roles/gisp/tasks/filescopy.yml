---
- name: Copy docker compose file from gisp submodule
  ansible.builtin.copy:
    src: "{{ role_path }}/files/gisp/compose.yaml"
    dest: "{{ path }}/docker-compose.yaml"
    mode: "{{ file_mode }}"
  tags: [filescopy]
  notify:
    - docker down gisp
    - docker up gisp

- name: Check if .env exists
  ansible.builtin.stat:
    path: "{{ path }}/.env"
  register: gisp_env_stat
  tags: [filescopy]

- name: Create .env from .env.example (first deploy only)
  ansible.builtin.template:
    src: "{{ role_path }}/files/gisp/.env.example"
    dest: "{{ path }}/.env"
    mode: "0600"
  when: not gisp_env_stat.stat.exists
  tags: [filescopy]
  notify:
    - docker down gisp
    - docker up gisp

- name: Ensure scripts directory exists
  ansible.builtin.file:
    path: "{{ path }}/scripts"
    state: directory
    mode: "{{ directory_mode }}"
  tags: [filescopy]

- name: Copy send_telegram.sh helper
  ansible.builtin.copy:
    src: "{{ role_path }}/files/gisp/scripts/send_telegram.sh"
    dest: "{{ path }}/scripts/send_telegram.sh"
    mode: "0755"
  tags: [filescopy]

- name: Ensure services/openwebui/data directory exists
  ansible.builtin.file:
    path: "{{ path }}/services/openwebui/data"
    state: directory
    mode: "{{ directory_mode }}"
  tags: [filescopy]

# .example files = first-deploy only; delete on server to force re-init
- name: Copy semantic synonyms from example (skips if already exists)
  ansible.builtin.copy:
    src: "{{ role_path }}/files/gisp/services/semantic/synonyms.example.json"
    dest: "{{ path }}/services/semantic/synonyms.json"
    mode: "{{ file_mode }}"
    force: false
  tags: [filescopy]
  notify:
    - docker down gisp
    - docker up gisp

- name: Copy webui database from example (skips if already exists)
  ansible.builtin.copy:
    src: "{{ role_path }}/files/gisp/services/openwebui/webui.db.example"
    dest: "{{ path }}/services/openwebui/data/webui.db"
    mode: "{{ file_mode }}"
    force: false
  tags: [filescopy]
  notify:
    - docker down gisp
    - docker up gisp
