---
# Platform level — auto-detected from inventory groups
# macbook → full macOS setup + configs
# homelab → bash + homelab aliases
# vps     → bash only

dotfiles_level: >-
  {%- if 'macbook' in group_names -%}macbook
  {%- elif 'homelab' in group_names -%}homelab
  {%- else -%}vps
  {%- endif -%}

# ── macOS settings ────────────────────────────────────────────────────────────

macbook_username: m

# Public key of the control machine — added to new Mac's authorized_keys
macbook_authorized_keys: ""

macbook_homebrew_formulae:
  - ansible
  - ansible-lint
  - bash                  # 5.x — /bin/bash on macOS is 3.2, bash-completion@2 needs 4.1+
  - bash-completion@2
  - bat
  - docker
  - docker-completion
  - duf
  - eza
  - fd
  - ffmpeg
  - fileicon
  - fzf
  - gh
  - git
  - git-filter-repo
  - gnupg
  - gpgme
  - go
  - gping
  - grc
  - helm
  - htop
  - imagemagick
  - jq
  - kubernetes-cli
  - mactop
  - mas
  - mcfly
  - mtr
  - ncdu
  - node
  - python@3.13
  - ripgrep
  - sevenzip
  - socat
  - hashicorp/tap/terraform
  - tree
  - uv
  - watch
  - wget
  - yt-dlp
  - yazi
  - zoxide

macbook_homebrew_casks:
  - anydesk
  - appcleaner
  - chatgpt
#  - cloudflare-warp  # installer hangs via CLI, install manually
  - cursor
  - datagrip
  - docker
  - element
  - finetune
  - font-symbols-only-nerd-font  # required for eza --icons=always
  - ghostty
  - keepingyouawake
  - keka
  - monitorcontrol
  - nightfall
#  - obsidian
  - qlcolorcode
#  - rectangle
  - plex
  - tailscale
  - transmission
  - vlc
  - zoom

