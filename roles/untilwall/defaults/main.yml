---
# defaults file for untilwall

# Required system packages
required_packages:  # noqa: var-naming[no-role-prefix]
  - docker-ce
  - docker-compose-plugin
  - curl
  - bash
  - openssl
  - vim
  - certbot
  - python3-setuptools
  - nginx

# Docker repository installation control
install_docker_repo: true  # noqa: var-naming[no-role-prefix]
update_repo: true  # noqa: var-naming[no-role-prefix]
force_repo_update: true  # noqa: var-naming[no-role-prefix]

# User and paths
folder_user: "{{ ansible_role_name | basename }}"  # noqa: var-naming[no-role-prefix]
pwd: "/untilwall"  # noqa: var-naming[no-role-prefix]
path: "{{ pwd }}"  # noqa: var-naming[no-role-prefix]
untilwall_cert_path: "/server/certbot"

# File permissions
directory_mode: "0755"  # noqa: var-naming[no-role-prefix]
file_mode: "0600"  # noqa: var-naming[no-role-prefix]

# Domain name for untilwall
untilwall_domain_name: "untilwall.0x3654.com"

# Application environment variables (public, not secrets)
untilwall_domain_url: "https://untilwall.0x3654.com"
untilwall_icloud_shortcut_url: "https://www.icloud.com/shortcuts/2e1536903783409c9445bb04dc381637"
