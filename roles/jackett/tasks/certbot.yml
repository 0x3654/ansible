---
- name: Include common certbot tasks
  ansible.builtin.include_role:
    name: common
    tasks_from: certbot.yml
  vars:
    common_up_handler_name: "docker up jackett"
    common_down_handler_name: "docker down jackett"
    common_domain_name: "{{ jackett_domain_name }}"
    common_cert_path: "{{ jackett_cert_path }}"
    common_telegram_notify_enabled: "{{ telegram_notify_enabled | default(false) }}"
    common_telegram_bot_token: "{{ jackett_telegram_bot_token | default('') }}"
    common_telegram_chat_id: "{{ jackett_telegram_chat_id | default('') }}"
    common_telegram_host_name: "{{ inventory_hostname }}"
  tags: [ssl]
