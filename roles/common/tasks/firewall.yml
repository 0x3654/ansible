- name: Get current iptables rules
  ansible.builtin.shell: iptables-save
  register: common_current_rules
  changed_when: false
  run_once: true

- name: Extract ports from current iptables rules
  ansible.builtin.set_fact:
    common_current_ports: >-
      {{
        common_current_rules.stdout_lines |
        select('search', '--dport') |
        map('regex_replace', '.*--dport\\s+([^\\s]+).*', '\\1') |
        list
      }}

- name: Build port -> rule map from required rules
  ansible.builtin.set_fact:
    common_required_ports_map: >-
      {% set result = {} %}
      {% for rule in common_required_rules %}
      {%   if '--dport' in rule %}
      {%     set port = rule | regex_replace('.*--dport\\s+([^\\s]+).*', '\\1') %}
      {%     set _ = result.update({port: rule}) %}
      {%   endif %}
      {% endfor %}
      {{ result }}

- name: Check which rules are missing (by port comparison)
  ansible.builtin.set_fact:
    common_missing_rules: >-
      {% set missing = [] %}
      {% for port, rule in common_required_ports_map.items() %}
      {%   if port not in common_current_ports %}
      {%     set _ = missing.append(rule) %}
      {%   endif %}
      {% endfor %}
      {{ missing }}
    common_extra_rules: "{{ common_prohibited_rules | intersect(common_current_rules.stdout_lines) }}"

- name: Add missing iptables rules
  when: common_missing_rules | length > 0
  ansible.builtin.shell: iptables {{ rule_data }}
  loop: "{{ common_missing_rules }}"
  changed_when: true
  loop_control:
    loop_var: rule_data

- name: Delete extra iptables rules
  when: common_extra_rules | length > 0
  ansible.builtin.shell: iptables {{ item | regex_replace('^-A', '-D') }}
  loop: "{{ common_extra_rules }}"
  changed_when: true
  loop_control:
    loop_var: item

- name: Save iptables rules using netfilter-persistent
  when: (common_missing_rules | length > 0) or (common_extra_rules | length > 0)
  block:
    - name: Install netfilter-persistent
      ansible.builtin.apt:
        name: netfilter-persistent
        state: present
        update_cache: true

    - name: Enable and start netfilter-persistent
      ansible.builtin.systemd:
        name: netfilter-persistent
        enabled: true
        state: started

    - name: Save
      ansible.builtin.command: netfilter-persistent save
      changed_when: true
