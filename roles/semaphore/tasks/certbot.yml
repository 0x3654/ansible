---
- name: Include common certbot tasks
  ansible.builtin.include_role:
    name: common
    tasks_from: certbot.yml
  vars:
    common_up_handler_name: "docker up semaphore"
    common_down_handler_name: "docker down semaphore"
    common_domain_name: "{{ semaphore_domain_name }}"
    common_cert_path: "{{ semaphore_cert_path }}"
    common_telegram_notify_enabled: "{{ telegram_notify_enabled | default(false) }}"
    common_telegram_bot_token: "{{ semaphore_telegram_bot_token }}"
    common_telegram_chat_id: "{{ semaphore_telegram_chat_id }}"
    common_telegram_host_name: "{{ inventory_hostname }}"
  tags: [ssl]
