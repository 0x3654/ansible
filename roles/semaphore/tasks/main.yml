---
- name: Import APT management tasks
  ansible.builtin.import_tasks: apt.yml
  tags: [apt, upgrade]

- name: Create role directory
  ansible.builtin.file:
    path: "{{ path }}"
    state: directory
    mode: "{{ directory_mode }}"

- name: Ensure system user exists
  ansible.builtin.user:
    name: "{{ folder_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Set directory ownership
  ansible.builtin.file:
    path: "{{ path }}"
    state: directory
    owner: "{{ folder_user }}"
    group: "{{ folder_user }}"
    mode: "{{ directory_mode }}"

- name: Import certbot tasks
  ansible.builtin.import_tasks: certbot.yml
  tags: [certbot]

- name: Check if database already exists
  ansible.builtin.stat:
    path: "{{ path }}/data/database.sqlite"
  register: semaphore_db_stat
  tags: [filescopy]

- name: Create data directory
  ansible.builtin.file:
    path: "{{ path }}/data"
    state: directory
    owner: "{{ folder_user }}"
    group: "{{ folder_user }}"
    mode: "{{ directory_mode }}"
  when: not semaphore_db_stat.stat.exists
  tags: [filescopy]

- name: Seed database if not present
  ansible.builtin.copy:
    src: "{{ role_path }}/files/database.sqlite"
    dest: "{{ path }}/data/database.sqlite"
    owner: "{{ folder_user }}"
    group: "{{ folder_user }}"
    mode: "0644"
  when: not semaphore_db_stat.stat.exists
  tags: [filescopy]

- name: Import file copy tasks
  ansible.builtin.import_tasks: filescopy.yml
  tags: [filescopy]

- name: Import nginx tasks
  ansible.builtin.import_tasks: nginx.yml
  tags: [nginx]

- name: Import firewall tasks
  ansible.builtin.import_tasks: firewall.yml
  tags: [firewall]
