services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: semaphore-tailscale
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TS_AUTHKEY: "{{semaphore_tailscale_authkey}}"
      TS_HOSTNAME: "vps-semaphore"
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_ACCEPT_DNS: "true"
    volumes:
      - tailscale-state:/var/lib/tailscale
    ports:
      - "127.0.0.1:{{semaphore_port}}:3000"

  semaphore:
    image: docker.io/semaphoreui/semaphore:latest
    container_name: semaphore
    restart: unless-stopped
    network_mode: "service:tailscale"
    depends_on:
      - tailscale
    environment:
      SEMAPHORE_WEB_ROOT: "{{semaphore_web_root}}"
      SEMAPHORE_ACCESS_KEY_ENCRYPTION: "{{semaphore_access_key_encryption}}"
      SEMAPHORE_DB_DIALECT: sqlite
      SEMAPHORE_DB_PATH: /var/lib/semaphore
    volumes:
      - ./data:/var/lib/semaphore

volumes:
  tailscale-state:
