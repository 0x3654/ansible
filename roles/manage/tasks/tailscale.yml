---
- name: Download Tailscale GPG key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}/{{ ansible_distribution_release }}.noarmor.gpg"
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: "0644"
  when: manage_tailscale_enabled | bool

- name: Add Tailscale apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
      https://pkgs.tailscale.com/stable/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} main
    state: present
    filename: tailscale
  when: manage_tailscale_enabled | bool

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  when: manage_tailscale_enabled | bool

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  when: manage_tailscale_enabled | bool

- name: Check Tailscale status
  ansible.builtin.command: tailscale status
  register: manage_tailscale_status
  changed_when: false
  failed_when: false
  when: manage_tailscale_enabled | bool

- name: Bring up Tailscale
  ansible.builtin.command: >
    tailscale up
    --accept-routes=false
    --reset
    --authkey={{ manage_tailscale_authkey }}
  changed_when: true
  when:
    - manage_tailscale_enabled | bool
    - >
      manage_tailscale_status.rc != 0 or
      'NeedsLogin' in (manage_tailscale_status.stdout | default('')) or
      'stopped' in (manage_tailscale_status.stdout | default(''))
  no_log: true
