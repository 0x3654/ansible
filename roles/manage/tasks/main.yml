- name: Import APT management tasks
  ansible.builtin.import_tasks: apt.yml
  tags: [apt, upgrade]

- name: Create manage directory
  ansible.builtin.file:
    path: "{{ path }}"
    state: directory
    mode: "{{ directory_mode }}"

- name: Ensure system user exists
  ansible.builtin.user:
    name: "{{ folder_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Set directory ownership
  ansible.builtin.file:
    path: "{{ path }}"
    state: directory
    owner: "{{ folder_user }}"
    group: "{{ folder_user }}"
    mode: "{{ directory_mode }}"

- name: Import file copy tasks
  ansible.builtin.import_tasks: filescopy.yml
  tags: [filescopy]

- name: Import firewall tasks
  ansible.builtin.import_tasks: firewall.yml
  tags: [firewall]

- name: Import Tailscale tasks
  ansible.builtin.import_tasks: tailscale.yml
  tags: [tailscale]
